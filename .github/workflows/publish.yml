name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target repository"
        required: true
        type: choice
        options:
          - testpypi
          - pypi
      skip_tests:
        description: "Skip test suite"
        required: false
        type: boolean
        default: false

jobs:
  build-linux:
    name: Build wheels (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # No actions/setup-python: cibuildwheel manages all target interpreters
      # (cp314) itself. A host framework Python would leak into the
      # macOS link step and mismatch the wheel's target version.
      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        with:
          output-dir: dist/

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-linux
          path: dist/*.whl

  build-macos:
    name: Build wheels (macOS arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      # No actions/setup-python: see build-linux. On macOS this is critical --
      # a host Python.framework (3.13) gets linked instead of cibuildwheel's
      # target (3.14), producing "symbol not found" for 3.14-only C-API symbols.
      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        with:
          output-dir: dist/
        env:
          MACOSX_DEPLOYMENT_TARGET: "14.0"

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-macos
          path: dist/*.whl

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Build sdist
        run: pip install build && python -m build --sdist

      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz

  test:
    name: Test wheel (py${{ matrix.python-version }})
    needs: build-linux
    if: ${{ !inputs.skip_tests }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/download-artifact@v8
        with:
          name: wheels-linux
          path: dist/

      - name: Install and test
        run: |
          # dist/ holds cp314 wheels. Install the local wheel
          # file matching the current interpreter by its cp tag, so the smoke
          # test can never silently fall back to a PyPI release. The default
          # index stays enabled so runtime deps (click, xxhash) still resolve.
          PYTAG="cp$(python -c 'import sys; print(f"{sys.version_info.major}{sys.version_info.minor}")')"
          pip install dist/catnip_lang-*-${PYTAG}-*.whl
          pip install pytest pytest-xdist pytest-rerunfailures pytest-timeout
          # Remove source package to prevent it from shadowing the installed wheel.
          # Python finds ./catnip/ before site-packages, which has no _rs.so.
          rm -rf catnip/
          pytest tests/language/ -q --timeout=120

  publish:
    name: Publish to ${{ inputs.target }}
    needs: [build-linux, build-macos, build-sdist, test]
    if: |
      always() &&
      needs.build-linux.result == 'success' &&
      needs.build-macos.result == 'success' &&
      needs.build-sdist.result == 'success' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.target }}
      url: ${{ inputs.target == 'pypi' && 'https://pypi.org/project/catnip-lang/' || 'https://test.pypi.org/project/catnip-lang/' }}
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist/
          merge-multiple: true

      - name: Publish to TestPyPI
        if: inputs.target == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: inputs.target == 'pypi'
        uses: pypa/gh-action-pypi-publish@release/v1
