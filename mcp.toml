# Tool and resource definitions for the Catnip end-user MCP server.
# Loaded at startup by server.py to build types.Tool and types.ResourceTemplate objects.
# Handler functions live in server.py, matched by convention: tool "foo" -> _tool_foo().

# ---------------------------------------------------------------------------
# Tools
# ---------------------------------------------------------------------------

[tools.parse_catnip]
description = "Parse Catnip code and return structured IR as JSON. Levels: 0=parse tree (text), 1=IR (default), 2=executable IR after semantic analysis. Output uses compact JSON (primitives flat, metadata omitted when default)."

[tools.parse_catnip.params]
code = { type = "string", required = true }
level = { type = "integer", default = 1, minimum = 0, maximum = 2 }

[tools.eval_catnip]
description = "Evaluate Catnip code and return result."

[tools.eval_catnip.params]
code = { type = "string", required = true }
context = { type = "object" }

[tools.check_syntax]
description = "Validate Catnip syntax without execution."

[tools.check_syntax.params]
code = { type = "string", required = true }

[tools.format_code]
description = "Format Catnip code with configurable style."

[tools.format_code.params]
code = { type = "string", required = true }
indent_size = { type = "integer", default = 4 }
line_length = { type = "integer", default = 120 }

[tools.debug_start]
description = "Start a debug session. Returns state at first breakpoint or end of execution."

[tools.debug_start.params]
code = { type = "string", required = true, description = "Catnip source code to debug" }
breakpoints = { type = "array", items_type = "integer", description = "Line numbers to break at (1-indexed)" }

[tools.debug_continue]
description = "Continue execution until next breakpoint."

[tools.debug_continue.params]
session_id = { type = "string", required = true }

[tools.debug_step]
description = "Step execution. Mode: 'into' (default), 'over', or 'out'."

[tools.debug_step.params]
session_id = { type = "string", required = true }
mode = { type = "string", enum = ["into", "over", "out"], default = "into" }

[tools.debug_inspect]
description = "Inspect local variables at current pause point."

[tools.debug_inspect.params]
session_id = { type = "string", required = true }

[tools.debug_eval]
description = "Evaluate an expression in the current debug scope."

[tools.debug_eval.params]
session_id = { type = "string", required = true }
expr = { type = "string", required = true }

[tools.debug_breakpoint]
description = "Add or remove a breakpoint at a line."

[tools.debug_breakpoint.params]
session_id = { type = "string", required = true }
line = { type = "integer", required = true }
action = { type = "string", enum = ["add", "remove"], default = "add" }

# ---------------------------------------------------------------------------
# Resource Templates
# ---------------------------------------------------------------------------

[resource_templates.examples]
uri_template = "catnip://examples/{topic}"
description = "Examples by theme (advanced, basics, broadcast, cfg, control-flow, embedding, functions, module-loading, pattern-matching, performance, run, tools)."
mime_type = "application/json"

[resource_templates.codex]
uri_template = "catnip://codex/{category}/{module}"
description = "Python integration examples (data-analytics, files-formats, geometry, geospatial, images-media, symbolic-graphs, utils, visualization, web)."
mime_type = "text/plain"

[resource_templates.docs-topic]
uri_template = "catnip://docs/{section}/{topic}"
description = "Language documentation. Sections: lang (syntax, functions, pattern-matching, broadcast, scopes-and-variables, control-flow, expressions, pragmas, glossary, turing-completeness), tuto (quickstart-0min, quickstart-2min, quickstart-5min), user (cli, repl, config, module-loading, embedding-guide, extending-context, host-integration, shebang-guide, run)."
mime_type = "text/markdown"

[resource_templates.docs-section]
uri_template = "catnip://docs/{section}"
description = "List available topics for a documentation section (lang, tuto, user)."
mime_type = "application/json"
